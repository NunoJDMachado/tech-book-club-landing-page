<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />

        <title>Frontend Mentor | Tech book club</title>

        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <header class="header wrapper">
            <img
                src="assets/images/logo.svg"
                alt="Tech book club logo"
                width="193"
                height="36"
                class="header__logo"
            />
        </header>

        <main>
            <section class="hero wrapper">
                <div class="hero__content">
                    <h1 class="hero__title text-preset-1">Join the ultimate tech book club</h1>

                    <p class="hero__text text-preset-5">
                        Turn your reading time into learning time with fellow tech enthusiasts. Get
                        curated recommendations, join vibrant discussions, and level up your skills
                        one chapter at a time.
                    </p>

                    <a href="#" class="hero__button text-preset-6">Review Membership Options</a>

                    <div class="hero__testimonial">
                        <img
                            src="assets/images/image-avatars.webp"
                            alt="avatars"
                            width="220"
                            height="80"
                            class="hero__avatars"
                        />

                        <div class="hero__stars">
                            <img
                                src="assets/images/icon-star.svg"
                                alt="star"
                                width="24"
                                height="25"
                            />
                            <img
                                src="assets/images/icon-star.svg"
                                alt="star"
                                width="24"
                                height="25"
                            />
                            <img
                                src="assets/images/icon-star.svg"
                                alt="star"
                                width="24"
                                height="25"
                            />
                            <img
                                src="assets/images/icon-star.svg"
                                alt="star"
                                width="24"
                                height="25"
                            />
                            <img
                                src="assets/images/icon-star.svg"
                                alt="star"
                                width="24"
                                height="25"
                            />
                        </div>

                        <p class="hero__testimonial-text text-preset-7">
                            200+ developers joined already
                        </p>
                    </div>
                </div>

                <img src="assets/images/image-hero-mobile.webp" alt="" class="hero__image" />
            </section>
        </main>
    </body>
</html>
